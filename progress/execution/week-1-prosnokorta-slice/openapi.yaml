openapi: 3.0.3
info:
  title: Prosnokorta Quiz Assignment API
  version: 0.1.0
  description: Week 1 contract draft for vertical slice implementation.
servers:
  - url: http://localhost:3000/api
paths:
  /quizzes:
    post:
      summary: Create quiz
      tags: [Quiz]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuizRequest"
      responses:
        "201":
          description: Quiz created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
    get:
      summary: List quizzes by current teacher
      tags: [Quiz]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of quizzes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quiz"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
  /assignments:
    post:
      summary: Assign quiz to students
      tags: [Assignment]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssignmentRequest"
      responses:
        "201":
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
  /submissions:
    post:
      summary: Submit quiz answers
      tags: [Submission]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubmissionRequest"
      responses:
        "201":
          description: Submission created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CreateQuizRequest:
      type: object
      required: [title, questions, dueAt]
      properties:
        title:
          type: string
          minLength: 3
        description:
          type: string
        questions:
          type: array
          items:
            type: object
        dueAt:
          type: string
          format: date-time
    Quiz:
      type: object
      properties:
        id:
          type: string
          format: uuid
        teacherId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        questions:
          type: array
          items:
            type: object
        dueAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    CreateAssignmentRequest:
      type: object
      required: [quizId, studentIds]
      properties:
        quizId:
          type: string
          format: uuid
        studentIds:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
    Assignment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        quizId:
          type: string
          format: uuid
        studentId:
          type: string
          format: uuid
        status:
          type: string
          enum: [assigned, submitted, reviewed]
        assignedAt:
          type: string
          format: date-time
    CreateSubmissionRequest:
      type: object
      required: [assignmentId, answers]
      properties:
        assignmentId:
          type: string
          format: uuid
        answers:
          type: object
    Submission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        assignmentId:
          type: string
          format: uuid
        answers:
          type: object
        submittedAt:
          type: string
          format: date-time
        score:
          type: number
          nullable: true
